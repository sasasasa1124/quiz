name: Claude Issue Agent

on:
  issues:
    types: [labeled]

jobs:
  claude-agent:
    # Only run when the 'agent' label is applied
    if: github.event.label.name == 'agent'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Please implement the following GitHub issue:

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Steps:
            1. Analyze the issue and form a clear implementation plan
            2. Create a new branch named `agent/issue-${{ github.event.issue.number }}`
            3. Implement the required changes (application code lives under quiz/)
            4. Commit your changes with a descriptive English/ASCII commit message
            5. Open a pull request that references and closes issue #${{ github.event.issue.number }}

            Project guidelines:
            - Follow CLAUDE.md in the repo root and quiz/CLAUDE.md
            - Keep commit messages in English/ASCII only (Cloudflare Pages requirement)
            - Run `npm run build` in quiz/ to verify the build before opening the PR
