name: Claude Issue Agent

on:
  issues:
    types: [opened]
  repository_dispatch:
    types: [process-issue]

jobs:
  claude-agent:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Please implement the following GitHub issue:

            Issue number: ${{ github.event.issue.number || github.event.client_payload.issue_number }}

            First, fetch the issue details with:
              gh issue view ${{ github.event.issue.number || github.event.client_payload.issue_number }} --repo ${{ github.repository }}

            Then follow these steps:
            1. Analyze the issue and form a clear implementation plan
            2. Create a new branch named `agent/issue-${{ github.event.issue.number || github.event.client_payload.issue_number }}`
            3. Implement the required changes (application code lives under quiz/)
            4. Commit your changes with a descriptive English/ASCII commit message
            5. Open a pull request with a body that includes exactly "Closes #${{ github.event.issue.number || github.event.client_payload.issue_number }}" so GitHub auto-closes the issue on merge

            Project guidelines:
            - Follow CLAUDE.md in the repo root and quiz/CLAUDE.md
            - Keep commit messages in English/ASCII only (Cloudflare Pages requirement)
            - Run `npm run build` in quiz/ to verify the build before opening the PR
